# Topology Management System Configuration File
# This file defines topology rules for geodatabase validation

dataset_name = "TKMDS"
topology_name = "tkm_topology"

# Polygon Feature Classes - Area Rules
[[rules]]
fc1 = "BuildingFootprint"
rule = "MUST_NOT_OVERLAP"

[[rules]]
fc1 = "BuiltUp"
rule = "MUST_NOT_OVERLAP"

[[rules]]
fc1 = "Cultivation"
rule = "MUST_NOT_OVERLAP"

[[rules]]
fc1 = "Plantation"
rule = "MUST_NOT_OVERLAP"

[[rules]]
fc1 = "Woodland"
rule = "MUST_NOT_OVERLAP"

[[rules]]
fc1 = "WaterCourseArea"
rule = "MUST_NOT_OVERLAP"

[[rules]]
fc1 = "WardBoundary"
rule = "MUST_NOT_OVERLAP"

[[rules]]
fc1 = "RoadCarriageway"
rule = "MUST_NOT_OVERLAP"

# Polyline Feature Classes - Line Rules
[[rules]]
fc1 = "RoadCenterline"
rule = "MUST_NOT_HAVE_DANGLES"

[[rules]]
fc1 = "RoadCenterline"
rule = "MUST_BE_SINGLE_PART"

[[rules]]
fc1 = "Powerline"
rule = "MUST_NOT_HAVE_DANGLES"

[[rules]]
fc1 = "Powerline"
rule = "MUST_BE_SINGLE_PART"

[[rules]]
fc1 = "OtherLine"
rule = "MUST_NOT_HAVE_DANGLES"

[[rules]]
fc1 = "CompoundWall"
rule = "MUST_NOT_HAVE_DANGLES"