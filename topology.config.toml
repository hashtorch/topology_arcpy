# Topology Management System Configuration File
# This file defines topology rules for geodatabase validation

dataset_name = "TKMDS"
topology_name = "tkm_topology"

# Building Footprint Rules
[[rules]]
fc1 = "BuildingFootprint"
rule_type = "MUST_NOT_OVERLAP"

[[rules]]
fc1 = "BuildingFootprint"
rule_type = "MUST_NOT_HAVE_GAPS"

# Tower Rules
[[rules]]
fc1 = "Tower"
rule_type = "MUST_BE_INSIDE"
fc2 = "BuildingFootprint"

# Waterbody Rules
[[rules]]
fc1 = "Waterbody"
rule_type = "MUST_NOT_OVERLAP"

[[rules]]
fc1 = "Waterbody"
rule_type = "MUST_NOT_HAVE_GAPS"

# Road Rules
[[rules]]
fc1 = "RoadCenterline"
rule_type = "MUST_NOT_OVERLAP"

# Canal Rules
[[rules]]
fc1 = "Canal"
rule_type = "MUST_NOT_OVERLAP"

# Land Cover Rules
[[rules]]
fc1 = "BuiltUp"
rule_type = "MUST_NOT_OVERLAP"

[[rules]]
fc1 = "BuiltUp"
rule_type = "MUST_NOT_HAVE_GAPS"