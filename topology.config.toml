# Topology Validation System Configuration File
# This file defines topology rules for geodatabase validation

dataset_name = "TKMDS"
topology_name = "tkm_topology"

# Mandatory Topology Rules - Single Layer Rules
[[rules]]
fc1 = "RoadCarriageway"
rule = "MUST_NOT_OVERLAP"

[[rules]]
fc1 = "Woodland"
rule = "MUST_NOT_OVERLAP"

[[rules]]
fc1 = "BuildingFootprint"
rule = "MUST_NOT_OVERLAP"

[[rules]]
fc1 = "BuiltUp"
rule = "MUST_NOT_OVERLAP"

# Additional Quality Rules - Line Rules
[[rules]]
fc1 = "RoadCenterline"
rule = "MUST_NOT_HAVE_DANGLES"

[[rules]]
fc1 = "RoadCenterline"
rule = "MUST_BE_SINGLE_PART"

[[rules]]
fc1 = "Powerline"
rule = "MUST_NOT_HAVE_DANGLES"

[[rules]]
fc1 = "Powerline"
rule = "MUST_BE_SINGLE_PART"

[[rules]]
fc1 = "OtherLine"
rule = "MUST_NOT_HAVE_DANGLES"

[[rules]]
fc1 = "CompoundWall"
rule = "MUST_NOT_HAVE_DANGLES"

# Mandatory Cross-Layer Topology Rules - MUST_NOT_OVERLAP_WITH
# NOTE: These rules are valid but fail with ArcGIS Desktop 10.8 due to compatibility issues
# The rules are kept for documentation and future ArcGIS version compatibility
# Area feature classes must not overlap with each other

[[rules]]
fc1 = "RoadCarriageway"
fc2 = "BuildingFootprint"
rule = "MUST_NOT_OVERLAP_WITH"

[[rules]]
fc1 = "RoadCarriageway"
fc2 = "Woodland"
rule = "MUST_NOT_OVERLAP_WITH"

[[rules]]
fc1 = "RoadCarriageway"
fc2 = "BuiltUp"
rule = "MUST_NOT_OVERLAP_WITH"

[[rules]]
fc1 = "BuildingFootprint"
fc2 = "BuiltUp"
rule = "MUST_NOT_OVERLAP_WITH"

[[rules]]
fc1 = "BuildingFootprint"
fc2 = "Woodland"
rule = "MUST_NOT_OVERLAP_WITH"

[[rules]]
fc1 = "Woodland"
fc2 = "BuiltUp"
rule = "MUST_NOT_OVERLAP_WITH"