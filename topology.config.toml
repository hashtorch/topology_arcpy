# Topology Management System Configuration File
# This file defines topology rules for geodatabase validation
# IMPORTANT: This config is designed for the FLATTENED GDB where all feature
# classes are consolidated into a single "Infrastructure" dataset

# Geodatabase path (pointing to flattened GDB for validation)
gdb_path = "D:/GDBs/C44B13F20_flattened.gdb"

# Feature dataset containing the feature classes (created by flatten command)
dataset_name = "TKMDS"

# Name for the topology
topology_name = "tkm_topology"

# Rule 1: BuildingFootprint features cannot overlap each other
[[rules]]
origin_fc = "BuildingFootprint"
rule_type = "MUST_NOT_OVERLAP"

# Rule 2: BuildingFootprint must not have gaps
[[rules]]
origin_fc = "BuildingFootprint"
rule_type = "MUST_NOT_HAVE_GAPS"

# Rule 3: Cross-layer rule (Tower must be inside BuildingFootprint)
[[rules]]
origin_fc = "Tower"
rule_type = "MUST_BE_INSIDE"
destination_fc = "BuildingFootprint"

# Additional rule examples for other feature classes:
