# Topology Validation System Configuration File
# This file defines topology rules for geodatabase validation

dataset_name = "TKMDS"
topology_name = "tkm_topology"

# Mandatory Topology Rules - Single Layer Rules
[[rules]]
fc1 = "RoadCarriageway"
rule = "MUST_NOT_OVERLAP"

[[rules]]
fc1 = "Woodland"
rule = "MUST_NOT_OVERLAP"

[[rules]]
fc1 = "BuildingFootprint"
rule = "MUST_NOT_OVERLAP"

# Mandatory Cross-Layer Rules - Logical Spatial Relationships
[[rules]]
fc1 = "Woodland"
rule = "MUST_NOT_OVERLAP_WITH"
fc2 = "Cultivation"

[[rules]]
fc1 = "Woodland"
rule = "MUST_NOT_OVERLAP_WITH"
fc2 = "Plantation"

[[rules]]
fc1 = "Woodland"
rule = "MUST_NOT_OVERLAP_WITH"
fc2 = "BuiltUp"

[[rules]]
fc1 = "RoadCarriageway"
rule = "MUST_NOT_OVERLAP_WITH"
fc2 = "RoadDivider"

[[rules]]
fc1 = "RoadCarriageway"
rule = "MUST_NOT_OVERLAP_WITH"
fc2 = "RoadIsland"

[[rules]]
fc1 = "RoadCarriageway"
rule = "MUST_NOT_OVERLAP_WITH"
fc2 = "RoadMedian"

[[rules]]
fc1 = "RoadCarriageway"
rule = "MUST_NOT_OVERLAP_WITH"
fc2 = "RoadRotary"

[[rules]]
fc1 = "BuildingFootprint"
rule = "MUST_NOT_OVERLAP_WITH"
fc2 = "BuiltUp"

[[rules]]
fc1 = "BuildingFootprint"
rule = "MUST_NOT_OVERLAP_WITH"
fc2 = "Cultivation"

[[rules]]
fc1 = "BuildingFootprint"
rule = "MUST_NOT_OVERLAP_WITH"
fc2 = "Plantation"

[[rules]]
fc1 = "BuildingFootprint"
rule = "MUST_NOT_OVERLAP_WITH"
fc2 = "RoadCarriageway"

# Additional Quality Rules - Line Rules
[[rules]]
fc1 = "RoadCenterline"
rule = "MUST_NOT_HAVE_DANGLES"

[[rules]]
fc1 = "RoadCenterline"
rule = "MUST_BE_SINGLE_PART"

[[rules]]
fc1 = "Powerline"
rule = "MUST_NOT_HAVE_DANGLES"

[[rules]]
fc1 = "Powerline"
rule = "MUST_BE_SINGLE_PART"

[[rules]]
fc1 = "OtherLine"
rule = "MUST_NOT_HAVE_DANGLES"

[[rules]]
fc1 = "CompoundWall"
rule = "MUST_NOT_HAVE_DANGLES"